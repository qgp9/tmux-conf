########################################
# common.conf — Shared settings (inner/base)
#
# Settings shared by both layers in the 2-layer tmux setup.
# Both inner (tmux.conf) and outer (tmux_base.conf)
# source this file first.
#
# Layer-specific settings like prefix, reload, status-left,
# and status-bg/fg are defined in their respective files.
########################################


########################################
# General
########################################

# Disable automatic window renaming — preserve manually set names
setw -g automatic-rename off

# Use vi key bindings in copy-mode
setw -g mode-keys vi

# Scrollback buffer size (lines)
set -g history-limit 10000

# Remove ESC key delay — essential for minimizing input latency in 2-layer setup
# Default 500ms → 0ms for instant ESC response in vim, etc.
set -sg escape-time 0

# Forward focus events from terminal to tmux
# Required on outer layer so inner tmux can detect focus changes
set -g focus-events on

# Terminal type — use tmux-256color (instead of screen-256color or xterm-256color)
# Provides full tmux feature support (italics, etc.) via proper terminfo
set -g default-terminal "tmux-256color"

# Enable xterm-style key sequences (Shift/Ctrl+Arrow, etc.)
set -g xterm-keys on

# Disable alternate screen — keep output visible after exiting less/man
# Neutralizes smcup (enter alternate screen) and rmcup (leave alternate screen)
set -g terminal-overrides 'xterm*:smcup@:rmcup@'


########################################
# Clipboard (OSC52)
########################################

# Copy to system clipboard via OSC52 escape sequence whenever tmux buffer is set.
# Works over SSH — copies to local clipboard from remote sessions.
# Requires copy-osc52.sh script in ~/.config/tmux/
# after-set-buffer: triggers on copy-mode copy, load-buffer, etc.
set-hook -g after-set-buffer 'run-shell "tmux show-buffer | ~/.config/tmux/copy-osc52.sh"'


########################################
# MOUSE
########################################

# prefix + m: Toggle mouse mode
# Mouse ON: pane selection, scroll, resize
# Mouse OFF: native terminal text selection/copy
unbind m
bind-key m if-shell 'tmux showw -gv mouse|grep on' \
         'set -g mouse off' \
         'set -g mouse on' \
         ;


########################################
# VI Copy-mode
########################################

# v: Begin visual selection (same as vim's v)
bind -T copy-mode-vi v send -X begin-selection \;

# y: Copy selection if active, otherwise enter yy (line copy) await mode
# - With selection: copy to buffer → forwarded to clipboard via OSC52 hook
# - Without selection: switch to copy-await table to wait for next key
bind -T copy-mode-vi y if -F "#{selection_active}" \
    { send -X copy-selection; } \
    { send -X begin-selection; switch-client -T copy-await }

# yy: Copy entire current line (same behavior as vim's yy)
# When y is pressed again in copy-await table:
# 1. Select line → 2. Brief wait (for selection to apply) → 3. Copy → 4. Return to copy-mode-vi
bind -T copy-await y { \
    send -X select-line ; \
    run "sleep 0.3" ; \
    send -X copy-selection ; \
    display-message 'Line Copied' ; \
    switch-client -T copy-mode-vi ; \
}

# Escape: Exit copy-mode (natural key for vim users)
bind -T copy-mode-vi Escape send -X cancel


########################################
# PANE
########################################

# prefix + s: Toggle synchronize-panes (send same input to all panes)
# Useful for running the same command on multiple servers simultaneously
bind-key s set-window-option synchronize-panes

# prefix + h/j/k/l: Vim-style pane navigation
# h=left, j=down, k=up, l=right
bind-key h selectp -L
bind-key j selectp -D
bind-key k selectp -U
bind-key l selectp -R

# prefix + H/J/K/L (uppercase): Vim-style pane resize
# -r: repeatable (can press repeatedly within repeat-time without prefix)
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2


########################################
# Windows
########################################

# prefix + Space: Next window
# prefix + BSpace (Backspace): Previous window
bind-key Space next
bind-key BSpace prev

# Preserve current pane directory when creating new windows/splits
# Default behavior starts in home directory, so we override
bind '"' split-window -c "#{pane_current_path}"       # Horizontal split
bind % split-window -h -c "#{pane_current_path}"      # Vertical split
bind c new-window -c "#{pane_current_path}"            # New window


########################################
# Other Binding
########################################

# prefix + A: Rename current window prompt
bind-key A command-prompt "rename-window '%%'"


########################################
# STATUS BAR (shared)
########################################

# Status line bracket decorators — green brackets wrapping each section
# @B1 = '[', @B2 = ']' (green)
# Used as #{@B1}...#{@B2} pattern in status-left, status-right, etc.
set -g @B1 '#[default]#[fg=green][#[default]'
set -g @B2 '#[default]#[fg=green]]#[default]'

# Inactive window: cyan index + white name
set-window-option -g window-status-format '#[fg=cyan]#I#[fg=blue]:#[fg=white]#W#[dim]#F'

# Active window: blue background + bold for emphasis
set-window-option -g window-status-current-format '#[bg=blue,bold]#[fg=cyan]#I#[fg=blue]:#[fg=white]#W#[dim]#F'

# Right side: [current path (~substituted)] [pane title] [date time]
# #{s|#{HOME}|~|:pane_current_path} — tmux built-in format substitution (3.1+)
# Converts $HOME to ~ without external shell process (sed)
set -g status-right-length 120
set -g status-right '[#{s|#{HOME}|~|:pane_current_path}]#{@B1}#T#{@B2}#{@B1}#[fg=blue]%Y-%m-%d #[default]%H:%M#{@B2}'

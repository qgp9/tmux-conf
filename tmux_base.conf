########################################
# tmux_base.conf — Outer (base) layer
#
# The outermost tmux in the 2-layer setup.
# Launched via `tbase` script: tmux -L base -f tmux_base.conf
# Inner tmux (tmux.conf) runs nested inside this.
#
# Prefix is C-q, avoiding conflict with inner's C-a.
# Status bar uses grey background + [BASE ▸] tag for visual distinction.
#
# Load order: common.conf → tmux_base.conf
########################################

# Load shared settings (mouse, vi copy-mode, pane/window navigation, shared status bar, etc.)
source-file ~/.config/tmux/common.conf


########################################
# PREFIX (base: C-q)
########################################

# Unbind default prefix (C-b) and set C-q
# Separate key from inner's C-a to avoid conflicts
unbind C-b
set -g prefix C-q

# prefix + q: Send C-q to nested tmux (for base inside another base)
bind  q send-prefix

# C-q C-q: Quick switch to last window
bind-key C-q last-window


########################################
# Reload (base-specific path)
########################################

# prefix + r: Reload base config only (common.conf is also re-sourced)
bind r 'source-file ~/.config/tmux/tmux_base.conf; display "Reloaded tmux_base.conf"'


########################################
# STATUS BAR (base: grey background + [BASE ▸] tag)
# @B1, @B2, window-status-format, status-right are defined in common.conf
########################################

# Status bar background: dark grey (colour235) — visually distinct from inner's black
# Foreground: light grey (colour245) — for readability
set -g status-bg colour235; set -g status-fg colour245

# Left side: [BASE ▸ host:session] [mouse status] [SYNC warning]
# [BASE ▸] prefix for immediate layer identification
# #h = short hostname (same as hostname -s)
# Shows red SYNC indicator when synchronize-panes is on
set -g status-left-length 80
set -g status-left '#{@B1}#[fg=red bold]BASE #[fg=default nobold]▸ #[fg=blue]#h:#[fg=cyan]#S#{@B2}[M:#{?mouse,#[fg=green bold]On #[fg=default nobold],Off}]#{?synchronize-panes,#[fg=red bold] SYNC#[default],} '

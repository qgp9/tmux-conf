set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jabirali/tmux-tilish'

run '~/.config/tmux/plugins/tpm/tpm'

set -g base-index 1
set -g @tilish-default 'even-horizontal'

bind-key -n M-Enter 'select-pane -t "bottom-right"; split-pane -c "#{pane_current_path}"'
#bind-key -n M-Enter 'set @_CWD "#{pane_current_path}"; select-pane -t "bottom-right"; split-pane -c "#{@_CWD}"'
#bind-key -n M-Enter run-shell 'tmux split-pane -c "#{pane_current_path}"'


#set -g default-command "reattach-to-user-namespace -l /bin/zsh"
setw -g automatic-rename off
#setw -g utf8 on
setw -g mode-keys vi
set -g history-limit 10000
#set -as terminal-features ",gnome*:RGB"
set -g terminal-overrides 'xterm*:smcup@:rmcup@' 
set -g default-terminal "screen-256color"
set -g xterm-keys on
bind-key -n S-F10 send-keys "\e[34~"

# set-clipboard
#set -s set-clipboard on
#set -g set-clipboard on
set-hook -g buffer-added 'run-shell "tmux show-buffer -b #{buffer_name} | ~/.local/bin/copy-osc52.sh"'
#if-shell "uname | grep -q Darwin" \
#    { set-hook -g buffer-added 'run-shell "tmux show-buffer -b #{buffer_name} | pbcopy"' } \
#    { set-hook -g buffer-added 'run-shell "tmux show-buffer -b #{buffer_name} | copy-osc52.sh"' }


########################################
# PREFIX
########################################

# Make it use C-a, similar to screen..
unbind C-b
#unbind l
set -g prefix C-a
bind  a send-prefix
bind-key C-a last-window

########################################
# MOUSE
########################################

unbind m
bind-key m if-shell 'tmux showw -gv mouse|grep on' \
         'set -g mouse off ; display "Mouse: OFF"' \
         'set -g mouse on  ; display "Mouse: ON"' \
         ;

########################################
# VI Copy-mode
########################################

setw -g mode-keys vi
set -s key-table-timeout 1000
bind -T copy-mode-vi v send -X begin-selection \;
bind -T copy-mode-vi y if -F "#{selection_active}" \
    { send -X copy-selection; } \
    { send -X begin-selection; switch-client -T copy-await }

bind -T copy-await y { \
    send -X select-line ; \
    run "sleep 0.3" ; \
    send -X copy-selection ; \
    display-message 'Line Copied' ; \
    switch-client -T copy-mode-vi ; \
}

# 4) Timeout: 마크만 찍히고 키가 없으면 취소
bind -T copy-await Timeout \
  send -X cancel \; \
  switch-client -T copy-mode-vi \;


########################################
# PANE
########################################

bind-key s set-window-option synchronize-panes 

bind-key -n C-tab selectp -l

bind-key h selectp -L
bind-key j selectp -D
bind-key k selectp -U
bind-key l selectp -R

# 비활성 pane 테두리 색상
set -g pane-border-style fg=colour238

# 활성 pane 테두리 색상(예: 파란색)
set -g pane-active-border-style fg=blue

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_current_command} #{?pane_active,🔥,} #[align=right]"


########################################
# Windows
########################################

bind-key Space next
bind-key BSpace prev

# new window, split pane in same dir
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

########################################
# Other Binding
########################################

bind-key A  command-prompt "rename-window '%%'" 
bind r 'source-file ~/.config/tmux/tmux.conf; display "... Reload ~/.config/tmux/tmux.conf ..."'

#if-shell 'command -v pbcopy >/dev/null 2>&1' "set-hook -g buffer-added 'run-shell \"tmux save-buffer -b #{buffer_name} - | pbcopy\"'"
#set-hook -g buffer-added 'run-shell "tmux save-buffer -b #{buffer_name} - | pbcopy"'


########################################
# STATUS BAR
########################################

set @B1 '#[default]#[fg=green][#[default]'
set @B2 '#[default]#[fg=green]]#[default]'
#set -g base-index 1

# Toggle status bar
#bind s set -g status; bind C-s set -g status

# Default colors
set -g status-bg black; set -g status-fg white
#set-option -g status-fg colour24; set-option -g status-bg default
#set status-style fg=white,bg=black

# Left side of status bar
set -g status-left-length 80
set -g status-left '[M:#{?mouse,On,Off}]#{@B1}#[fg=blue]#H:#[fg=cyan]#S#{@B2} '

# Inactive windows in status bar
set-window-option -g window-status-format '#[fg=cyan]#I#[fg=blue]:#[fg=white]#W#[dim]#F'
# Current or active window in status bar
set-window-option -g window-status-current-format '#[bg=blue,bold]#[fg=cyan]#I#[fg=blue]:#[fg=white]#W#[dim]#F'

# Right side of status bar
set -g status-right-length 80
set -g status-right '[#{pane_current_path}]#{@B1}#T#{@B2}#{@B1}#[fg=blue]%Y-%m-%d #[default]%H:%M#{@B2}'
